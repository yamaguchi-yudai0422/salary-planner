<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>給料計算アプリ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Salary Planner</p>
        <h1>給料計算アプリ</h1>
        <p class="hero-copy">スマホで日ごとの勤務を記録し、月収と年収をすばやく確認できます。</p>
      </div>
      <div class="hero-stats">
        <div class="hero-stat">
          <span>今月の見込み</span>
          <strong id="heroMonthlyPay">¥0</strong>
        </div>
        <div class="hero-stat">
          <span>今年の合計</span>
          <strong id="heroYearlyPay">¥0</strong>
        </div>
      </div>
    </header>

    <main>
      <section id="calendarView" class="view active">
        <div class="mobile-stack">
          <section class="panel panel-large">
            <div class="panel-header">
              <div>
                <p class="section-label">1. カレンダー</p>
                <h2 id="calendarTitle">2026年3月</h2>
              </div>
              <div class="month-switcher">
                <button id="prevMonthBtn" class="ghost-btn" type="button">前の月</button>
                <button id="todayBtn" class="ghost-btn" type="button">今月へ</button>
                <button id="nextMonthBtn" class="ghost-btn" type="button">次の月</button>
                <button id="clearMonthBtn" class="ghost-btn danger-btn" type="button">クリア</button>
              </div>
            </div>
            <div class="weekdays" id="weekdayHeader"></div>
            <div class="calendar-grid" id="calendarGrid"></div>
          </section>

          <section class="panel quick-summary">
            <div class="panel-header compact">
              <div>
                <p class="section-label">選択中の日付</p>
                <h2 id="selectedDateQuickLabel">日付を選択</h2>
              </div>
              <button id="openEntryEditorBtn" class="primary-btn" type="button">入力する</button>
            </div>
            <div class="summary-card">
              <span>その日の合計</span>
              <strong id="selectedDayPayValue">¥0</strong>
              <small id="selectedDayHoursValue">合計 0 時間 / 0 件</small>
              <div id="selectedDayBreakdown" class="selected-day-breakdown"></div>
            </div>
          </section>
        </div>
      </section>

      <section id="entryView" class="view">
        <section class="panel panel-large">
          <div class="panel-header">
            <div>
              <p class="section-label">日付入力</p>
              <h2 id="selectedDateLabel">日付を選択</h2>
            </div>
          </div>

          <form id="entryForm" class="entry-form">
            <div class="entry-list-header">
              <span>勤務明細</span>
            </div>
            <div id="entryRows" class="entry-rows"></div>
            <div class="entry-preview">
              <span>その日の給料</span>
              <strong id="dailyPayPreview">¥0</strong>
            </div>
            <div class="button-row">
              <button class="primary-btn" type="submit">保存</button>
              <button id="addEntryRowBtn" class="ghost-btn" type="button">追加</button>
              <button id="resetEntryBtn" class="ghost-btn" type="button">その日を削除</button>
              <button id="backToCalendarBtn" class="ghost-btn" type="button">戻る</button>
            </div>
          </form>
        </section>
      </section>

      <section id="summaryView" class="view">
        <div class="mobile-stack">
          <section class="panel">
            <div class="panel-header compact">
              <div>
                <p class="section-label">2. 月収</p>
                <h2>月ごとの合計</h2>
              </div>
            </div>
            <label class="summary-control">
              対象の月
              <input id="monthSummaryInput" type="month">
            </label>
            <div class="summary-card">
              <span>月収</span>
              <strong id="monthlyPayValue">¥0</strong>
              <small id="monthlyHoursValue">合計 0 時間</small>
            </div>
            <div class="mini-summary-grid">
              <div class="mini-summary-card">
                <span>勤務回数</span>
                <strong id="monthlyShiftCountValue">0回</strong>
              </div>
            </div>
            <div class="workplace-summary-wrap">
              <p class="section-label">勤務先ごとの集計</p>
              <div id="workplaceMonthlySummary" class="workplace-summary-list"></div>
            </div>
          </section>

          <section class="panel">
            <div class="panel-header compact">
              <div>
                <p class="section-label">3. 年収</p>
                <h2>年ごとの合計</h2>
              </div>
            </div>
            <label class="summary-control">
              対象の年
              <select id="yearSummarySelect"></select>
            </label>
            <div class="summary-card accent">
              <span>年収</span>
              <strong id="yearlyPayValue">¥0</strong>
              <small id="yearlyHoursValue">合計 0 時間</small>
            </div>
          </section>
        </div>
      </section>

      <section id="templateView" class="view">
        <section class="panel panel-large">
          <div class="panel-header">
            <div>
              <p class="section-label">テンプレ作成画面</p>
              <h2>時給テンプレ設定</h2>
            </div>
            <button id="backToCalendarFromTemplateBtn" class="ghost-btn" type="button">戻る</button>
          </div>

          <form id="templateForm" class="template-form">
            <input id="templateIdInput" type="hidden">
            <label>
              名前
              <input id="templateNameInput" type="text" maxlength="40" placeholder="例: 平日シフト">
            </label>
            <label>
              時給
              <input id="templateWageInput" type="number" min="0" step="1" placeholder="例: 1100">
            </label>
            <label>
              労働時間
              <input id="templateHoursInput" type="number" min="0" step="0.25" placeholder="例: 5">
            </label>
            <fieldset class="weekday-picker">
              <legend>曜日</legend>
              <div id="weekdayCheckboxes" class="weekday-options"></div>
            </fieldset>
            <fieldset class="month-picker">
              <legend>月</legend>
              <div id="monthCheckboxes" class="month-options"></div>
            </fieldset>
            <div class="button-row">
              <button class="primary-btn" type="submit">テンプレ保存</button>
              <button id="cancelTemplateEditBtn" class="ghost-btn" type="button">入力をクリア</button>
            </div>
          </form>

          <div class="template-list-wrap">
            <div class="panel-header compact">
              <div>
                <p class="section-label">保存済みテンプレ</p>
                <h2>曜日の自動追加に使用</h2>
              </div>
            </div>
            <div id="templateList" class="template-list"></div>
          </div>
        </section>
      </section>
    </main>

    <nav class="bottom-nav">
      <button id="navCalendarBtn" class="bottom-nav-btn active" type="button">カレンダー</button>
      <button id="navSummaryBtn" class="bottom-nav-btn" type="button">集計</button>
      <button id="navTemplateBtn" class="bottom-nav-btn" type="button">テンプレ</button>
    </nav>
  </div>

  <script src="app.js"></script>
</body>
</html>
